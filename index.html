<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KesefSensiVip</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --red: #ff0000;
            --red-glow: rgba(255, 0, 0, 0.4);
            --green: #00ff00; /* Nova cor para sucesso */
            --green-glow: rgba(0, 255, 0, 0.4); /* Nova cor para brilho de sucesso */
            --bg-black: #000000;
            --panel-bg: rgba(10, 10, 12, 0.98);
            --border: #222;
            --transition-speed: 0.3s;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body, html {
            height: 100%; width: 100%;
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-black);
            color: white; overflow-x: hidden;
        }

        /* FUNDO ANIMADO */
        #canvas-bg {
            position: fixed; top: 0; left: 0; z-index: -1;
            width: 100%; height: 100%;
        }

        /* TELA DE LOGIN */
        #login-screen {
            position: fixed; inset: 0;
            background: var(--bg-black);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000;
        }

        .login-card {
            width: 85%; max-width: 320px;
            padding: 40px 20px;
            background: #080808;
            border: 1px solid var(--border); /* Borda padrão cinza escuro */
            border-radius: 15px; text-align: left;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
        }

        /* Classes de Feedback para o Card */
        .login-card.error {
            border-color: var(--red);
            box-shadow: 0 0 30px var(--red-glow);
        }

        .login-card.success {
            border-color: var(--green);
            box-shadow: 0 0 30px var(--green-glow);
        }

        .login-card h1 { font-family: 'Orbitron'; font-size: 1.4rem; color: white; margin-bottom: 5px; }
        
        /* Texto de Edição VIP Padrão */
        .login-card .edition-text { color: #888; font-size: 9px; font-weight: 900; letter-spacing: 3px; display: block; margin-bottom: 25px; transition: color var(--transition-speed); }
        
        /* Modificações de Texto de Feedback */
        .login-card.error .edition-text { color: var(--red); }
        .login-card.success .edition-text { color: var(--green); }

        .pass-input {
            width: 100%; background: #000; border: 1px solid #333;
            padding: 15px; color: white; border-radius: 8px;
            margin-bottom: 20px; outline: none;
            font-family: 'Orbitron'; transition: 0.3s;
        }
        .pass-input:focus { border-color: var(--red); box-shadow: 0 0 10px var(--red-glow); }

        .btn-access {
            width: 100%; padding: 15px; background: var(--red); border: none;
            color: white; font-family: 'Orbitron'; font-weight: 900;
            border-radius: 8px; cursor: pointer; text-transform: uppercase;
            transition: background var(--transition-speed);
        }
        
        .login-card.success .btn-access { background: var(--green); color: black; }

        /* APP PRINCIPAL - SEM ESPAÇO NO TOPO */
        #main-app {
            display: none; width: 100%; height: 100vh;
            flex-direction: column; padding: 20px;
            overflow-y: auto;
        }

        .header {
            width: 100%; padding: 15px 0;
            border-bottom: 1px solid var(--red);
            margin-bottom: 25px; text-align: left;
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        .header h2 { font-family: 'Orbitron'; font-size: 1.3rem; margin: 0; text-transform: uppercase; }
        .header .ver { color: var(--red); font-size: 10px; font-weight: 900; margin-left: 5px; }

        /* CARDS */
        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; margin-bottom: 20px;
            width: 100%; text-align: left;
        }
        .card h3 {
            font-family: 'Orbitron'; font-size: 12px; color: var(--red);
            margin-bottom: 20px; text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* SENSIBILIDADE */
        .row { margin-bottom: 20px; }
        .row label { display: flex; justify-content: space-between; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #888; text-transform: uppercase; }
        .row label span { color: var(--red); }
        
        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 4px; background: #1a1a1a; outline: none; border-radius: 2px;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; background: var(--red);
            border-radius: 2px; cursor: pointer; box-shadow: 0 0 8px var(--red-glow);
        }

        /* MACROS */
        .macro-item {
            background: rgba(255,255,255,0.02); padding: 15px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px; border: 1px solid #111;
        }
        .macro-item span { font-size: 14px; font-weight: 600; color: #ccc; }

        /* SWITCH */
        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0; background: #222;
            transition: .3s; border-radius: 4px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px;
            left: 3px; bottom: 3px; background: #555; transition: .3s; border-radius: 2px;
        }
        input:checked + .slider { background: var(--red); }
        input:checked + .slider:before { transform: translateX(20px); background: white; }

        /* BOTÕES */
        .btn-clean {
            width: 100%; padding: 15px; background: transparent; border: 1px solid var(--red);
            color: white; font-family: 'Orbitron'; cursor: pointer; margin-top: 10px;
            font-size: 12px; letter-spacing: 1px; border-radius: 4px;
        }

        .footer {
            margin-top: auto; padding: 20px 0; font-size: 9px; color: #444;
            text-align: left; letter-spacing: 1px;
        }

        /* BARRA DE PROGRESSO */
        #p-area { display: none; margin-top: 15px; }
        .p-bar { width: 100%; background: #111; height: 4px; border-radius: 2px; overflow: hidden; }
        .p-fill { height: 100%; background: var(--red); width: 0%; transition: 0.1s; }

    </style>
</head>
<body>

    <canvas id="canvas-bg"></canvas>

    <div id="login-screen">
        <div class="login-card" id="loginCard">
            <h1>KESEF SENSI</h1>
            <span class="edition-text" id="statusText">RED EDITION VIP</span>
            <input type="password" id="pass" class="pass-input" placeholder="SENHA DE ACESSO">
            <button class="btn-access" onclick="auth()">AUTENTICAR</button>
        </div>
    </div>

    <div id="main-app">
        <div class="header">
            <div>
                <h2>KESEF VIP <span class="ver">v4.0</span></h2>
            </div>
            <button onclick="location.reload()" style="background:none; border:none; color:var(--red); font-family:'Orbitron'; font-size:10px; cursor:pointer;">[ LOGOUT ]</button>
        </div>

        <div class="card">
            <h3>🎯 AJUSTES DE SENSIBILIDADE</h3>
            <div class="row">
                <label>GERAL <span id="s1">50%</span></label>
                <input type="range" min="0" max="100" value="50" oninput="s1.innerText=this.value+'%'">
            </div>
            <div class="row">
                <label>RED DOT <span id="s2">50%</span></label>
                <input type="range" min="0" max="100" value="50" oninput="s2.innerText=this.value+'%'">
            </div>
            <div class="row">
                <label>MIRA 2X <span id="s3">50%</span></label>
                <input type="range" min="0" max="100" value="50" oninput="s3.innerText=this.value+'%'">
            </div>
            <div class="row">
                <label>MIRA 4X <span id="s4">50%</span></label>
                <input type="range" min="0" max="100" value="50" oninput="s4.innerText=this.value+'%'">
            </div>
        </div>

        <div class="card">
            <h3>⌨️ SCRIPTS DE AUXÍLIO</h3>
            <div class="macro-item">
                <span>Aimbot Soft (Head)</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>
            <div class="macro-item">
                <span>No Recoil Automático</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>
            <div class="macro-item">
                <span>Antena Laser</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>
            <div class="macro-item">
                <span>Bypass Anticheat</span>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>

            <button class="btn-clean" id="cBtn" onclick="runClean()">LIMPAR CACHE DO JOGO</button>
            <div id="p-area">
                <div class="p-bar"><div class="p-fill" id="p-fill"></div></div>
                <p id="p-txt" style="font-size:9px; color:var(--red); margin-top:8px; text-transform:uppercase;"></p>
            </div>
        </div>

        <div class="footer">
            © TODOS OS DIREITOS RESERVADOS A KESEFSENSI<br>
            SISTEMA CRIPTOGRAFADO | ESTADO: PROTEGIDO
        </div>
    </div>

    <script>
        // BACKGROUND ANIMADO
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        function drawGrid() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(255, 0, 0, 0.05)";
            ctx.lineWidth = 0.5;
            const step = 40;
            const offset = (Date.now() / 60) % step;
            for (let x = offset; x < canvas.width; x += step) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }
            for (let y = offset; y < canvas.height; y += step) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
            }
            requestAnimationFrame(drawGrid);
        }
        drawGrid();

        // LOGIN COM FEEDBACK VISUAL SOLICITADO
        function auth() {
            const passInput = document.getElementById('pass');
            const loginCard = document.getElementById('loginCard');
            const statusText = document.getElementById('statusText');

            // Reseta classes e textos anteriores
            loginCard.classList.remove('error', 'success');
            statusText.innerText = "VERIFICANDO...";
            statusText.style.color = "#888"; // Cor padrão de verificação

            if(passInput.value === "KesefSensi_0102") {
                // SUCESSO!
                loginCard.classList.add('success');
                statusText.innerText = "SUCESSO!";
                
                // Aguarda um momento antes de entrar
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'flex';
                }, 1000); // 1 segundo de delay para exibir o feedback

            } else {
                // FALHA!
                loginCard.classList.add('error');
                statusText.innerText = "SENHA INCORRETA!";
                
                // Limpa o campo de senha
                passInput.value = "";
                passInput.focus();
            }
        }

        // LIMPEZA
        function runClean() {
            const btn = document.getElementById('cBtn');
            const area = document.getElementById('p-area');
            const fill = document.getElementById('p-fill');
            const txt = document.getElementById('p-txt');
            btn.style.display = 'none';
            area.style.display = 'block';
            let p = 0;
            const itv = setInterval(() => {
                p++;
                fill.style.width = p + "%";
                if(p < 50) txt.innerText = "Limpando logs de sistema...";
                else if(p < 90) txt.innerText = "Otimizando registros de sensibilidade...";
                else txt.innerText = "Concluindo...";
                if(p >= 100) {
                    clearInterval(itv);
                    txt.innerText = "Limpeza concluída com sucesso!";
                    setTimeout(() => { area.style.display = 'none'; btn.style.display = 'block'; p = 0; }, 1500);
                }
            }, 40);
        }
    </script>
</body>
</html>
